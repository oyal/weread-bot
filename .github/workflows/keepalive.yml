name: Keepalive Workflow

on:
  schedule:
    - cron: "0 0 * * *" # 每天午夜运行一次检查
  workflow_dispatch:    # 保留手动触发按钮，以防万一

# 重点注意：必须显式赋予写入权限，否则无法自动提交代码
permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keepalive Action
        uses: gautamkrishnar/keepalive-workflow@v2
        # 你可以通过 with 参数来自定义，比如：
        # with:
        #   commit_message: "chore: auto keepalive"
